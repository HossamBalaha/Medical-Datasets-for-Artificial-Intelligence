# ==============================================================================
# Site Settings
# ==============================================================================
title: Medical AI Datasets Repository
description: >-
  A curated, comprehensive collection of high-quality medical imaging and 
  clinical datasets designed to support artificial intelligence research, 
  development, and benchmarking in healthcare.

# The base hostname and protocol for your site.
url: "https://HossamBalaha.github.io"
baseurl: "/Medical-Datasets-for-Artificial-Intelligence"

# ==============================================================================
# Build Settings
# ==============================================================================
theme: jekyll-theme-cayman
markdown: kramdown

# GitHub Pages natively supported plugins for better SEO and navigation
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# ==============================================================================
# Default Front Matter
# ==============================================================================
# This ensures all Markdown files in the docs/ folder are rendered with the theme's default layout
defaults:
  - scope:
      path: "docs" # Applies to everything in the docs folder
    values:
      layout: default

# ==============================================================================
# Exclusions
# ==============================================================================
# Prevent Jekyll from processing these files, keeping the build clean and fast
exclude:
  - README.md          # The root README is for GitHub, not the Jekyll site
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.v0.md
  - SplitReadmeToPages.py
